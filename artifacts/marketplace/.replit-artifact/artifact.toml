kind = "mobile"
previewPath = "/"
title = "P2P Marketplace"
version = "1.0.0"
id = "artifacts/marketplace"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21583

[services.development]
run = "pnpm --filter @workspace/marketplace run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/marketplace", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/marketplace", "run", "serve" ]

[services.env]
PORT = "21583"
BASE_PATH = "/"
